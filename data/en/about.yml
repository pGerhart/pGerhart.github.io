about:
  image : images/tu_portrait.jpg
  title :  About Me
  content : "I am Paul Gerhart, a dedicated researcher, specializing in the field of cryptography. My primary areas of focus encompass the study of fair protocols, password-hardening, and privacy."
  cryptography:
    title : Cryptography 
    icon : ti-lock
    content : "Cryptography is my passion because it seamlessly bridges two of my favorite domains: mathematics and computer science.  Marrying mathematical theory's elegance with real-world practicality makes it a fascinating realm where abstract concepts become powerful tools.  While modern cryptographic tools' power and almost enchanting abilities seem like magic because they are too strong to be possibly true, it is fascinating how we can leverage them just through the beauty of assumptions and logical conclusions. It is even more fascinating when your childhood dream career was to be a magician, as it was for me."
    contentshort : "Cryptography is my passion because it bridges two of my two favorite domains: mathematics and computer science. While the power and elegance of modern cryptographic tools seem like magic because they are too strong to be possibly true, for me, it is fascinating how we can leverage them using just the beauty of assumptions and logical conclusions. "
  privacy:  
    title : Privacy
    icon : ti-id-badge 
    content : "Modern applications, with their increasing complexity, frequently overlook the importance of user privacy. My aim is to facilitate research on sensitive data through the use of cryptographic methods, ensuring that applications can operate fully without compromising the privacy of any user. 
                "

      